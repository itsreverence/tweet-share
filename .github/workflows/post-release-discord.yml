name: Post release to Discord

# Manual releases from the GitHub UI still fire release:published. Auto releases
# from tag-release-version.yml post Discord in that workflow (GITHUB_TOKEN limit).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v0.6.2)
        required: true
        type: string

permissions:
  contents: read

jobs:
  post-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Find userscript asset
        id: asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET_NAME=$(gh release view "${{ steps.meta.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --json assets \
            --jq '.assets[] | select(.name | endswith(".user.js")) | .name' \
            | head -n 1)

          if [ -z "$ASSET_NAME" ]; then
            echo "No .user.js release asset found for tag ${{ steps.meta.outputs.tag }}"
            exit 1
          fi

          echo "name=$ASSET_NAME" >> "$GITHUB_OUTPUT"

      - name: Download userscript asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.meta.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "${{ steps.asset.outputs.name }}" \
            --clobber

      - name: Post to Discord
        env:
          GH_TOKEN: ${{ github.token }}
          WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
          ASSET_PATH: ${{ steps.asset.outputs.name }}
          ASSET_NAME: ${{ steps.asset.outputs.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          PUBLISHED_AT: ${{ github.event.release.published_at }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: bash .github/scripts/post-discord-release.sh
