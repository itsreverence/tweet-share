name: Release

# Bump package.json version, push to master — publishes v{version} as Latest.

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Verify release build
        run: |
          npm test
          npm run check

      - name: Publish when package.json version is new
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(jq -r .version package.json)
          TAG="v${VERSION}"
          ASSET="tweet-discord-share.user.js"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cp dist/tweet-discord-share.user.js "$ASSET"
          sha256sum "$ASSET" > checksums.txt

          gh release create "$TAG" --title "$TAG" --generate-notes --latest "$ASSET" checksums.txt

          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
