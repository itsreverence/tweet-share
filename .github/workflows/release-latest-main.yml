name: Release Latest Main

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  release-latest-main:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build and syntax-check userscript
        run: npm run check

      - name: Package release asset
        run: cp dist/tweet-discord-share.user.js tweet-discord-share.user.js

      - name: Create or update latest-main prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="latest-main"
          TITLE="latest-main"
          NOTES="Auto-updated build from ${GITHUB_REF_NAME} (${GITHUB_SHA})."

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes "$NOTES" --prerelease
          else
            gh release create "$TAG" --title "$TITLE" --notes "$NOTES" --prerelease
          fi

      - name: Upload latest-main userscript asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload latest-main \
            tweet-discord-share.user.js \
            --clobber
