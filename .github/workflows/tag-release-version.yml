name: Tag release version

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  release-if-new-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Publish release for new package version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(jq -r .version package.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Could not read version from package.json"
            exit 1
          fi

          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping"
            exit 0
          fi

          npm run build
          node --check dist/tweet-discord-share.user.js
          cp dist/tweet-discord-share.user.js tweet-discord-share.user.js
          sha256sum tweet-discord-share.user.js > checksums.txt

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --latest \
            tweet-discord-share.user.js \
            checksums.txt

          echo "Published $TAG as latest release"
